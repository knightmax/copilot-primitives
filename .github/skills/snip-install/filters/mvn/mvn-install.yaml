name: "mvn-install"
version: 1
description: "Maven install — filters build and installation output"

match:
  command: "mvn"
  subcommand: "install"

pipeline:
  - action: "remove_lines"
    pattern: "^\\[INFO\\]\\s+(Downloading|Downloaded|Building|Scanning|Copying|Installing)"
  - action: "remove_lines"
    pattern: "^\\[DEBUG\\]"
  - action: "keep_lines"
    pattern: "BUILD|ERROR|WARNING|SUCCESS|\\[jar\\]|\\[war\\]|Tests run:|Failures:|Errors:"

on_error: "passthrough"
