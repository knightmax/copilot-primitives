name: "maven-build"
version: 1
description: "Condensed Maven build output: compilation errors, warnings, and build result"

match:
  command: "mvn"
  subcommand: "compile|build|package|install|clean"

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\[INFO\\]\\s+(Download|Downloading|Downloaded|Downloading from|Using the org\\.apache\\.maven\\.plugins:maven|Using implementation)"
  - action: "remove_lines"
    pattern: "^\\[INFO\\]\\s+Replacing original artifact with shaded artifact\\."
  - action: "remove_lines"
    pattern: "^\\[INFO\\] (Repository system is.*|Default locale):"
  - action: "remove_lines"
    pattern: "^\\[INFO\\]\\s+$|^\\s+$"
  - action: "keep_lines"
    pattern: "(\\[ERROR\\]|\\[WARNING\\]|BUILD (SUCCESS|FAILURE)|Reactor Summary|ERROR)"
  - action: "compact_path"
  - action: "format_template"
    template: "{{if eq .count 0}}Build completed.{{else}}{{.lines}}{{end}}"

on_error: "passthrough"
