name: "mvn-compile"
version: 1
description: "Maven compile — filters download messages and verbose logging"

match:
  command: "mvn|mvnd"
  subcommand: "compile"

pipeline:
  - action: "remove_lines"
    pattern: "^\\[INFO\\]\\s+(Downloading|Downloaded|Scanning|Building jar|Building war)"
  - action: "remove_lines"
    pattern: "^\\[DEBUG\\]"
  - action: "keep_lines"
    pattern: "\\[ERROR\\]|\\[WARN\\]|ERROR|WARNING|Compiling|BUILD"
  - action: "strip_ansi"

on_error: "passthrough"
