name: "npm-run"
version: 1
description: "Condensed npm run output: keeps script result, warnings, and errors"

match:
  command: "npm"
  subcommand: "run"

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^npm (notice|info)"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "keep_lines"
    pattern: "npm ERR!|npm WARN|error|warning|failed|FAIL|PASS|Done in|compiled (successfully|with)|build (failed|succeeded)|lint|test"

on_error: "passthrough"
