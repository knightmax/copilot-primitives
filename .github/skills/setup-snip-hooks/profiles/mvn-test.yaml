name: "mvn-test"
version: 1
description: "Maven Surefire test execution - keeps test results, failures, and errors"

match:
  command: "mvn"
  subcommand: "test"

pipeline:
  - action: "remove_lines"
    pattern: "^\\[INFO\\]\\s+(Downloading|Downloaded|Scanning|Building|Loading)"
  - action: "remove_lines"
    pattern: "^\\[DEBUG\\]"
  - action: "keep_lines"
    pattern: "Tests run:|Failures:|Errors:|Skipped:|BUILD SUCCESS|BUILD FAILURE|Running |PASS|FAIL|ERROR"
  - action: "aggregate"
    patterns:
      "Tests run": "^\\[INFO\\]\\s+Tests run:"
      "Failures": "^\\[INFO\\]\\s+Failures:"
      "Errors": "^\\[INFO\\]\\s+Errors:"
  - action: "strip_ansi"

on_error: "passthrough"
