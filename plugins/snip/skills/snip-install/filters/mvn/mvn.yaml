name: "mvn"
version: 1
description: "General Maven/mvnd output — fallback filter for all commands"

match:
  command: "mvn"

pipeline:
  - action: "remove_lines"
    pattern: "^\\[DEBUG\\]"
  - action: "remove_lines"
    pattern: "^\\[INFO\\]\\s+(Downloading|Downloaded|Scanning|Loading)"
  - action: "keep_lines"
    pattern: "BUILD|ERROR|SUCCESS|WARNING|FAILURE"
  - action: "strip_ansi"

on_error: "passthrough"
