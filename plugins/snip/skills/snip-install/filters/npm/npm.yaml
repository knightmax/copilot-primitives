name: "npm"
version: 1
description: "General npm output - fallback filter for all commands"

match:
  command: "npm"

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^npm (notice|info)"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "keep_lines"
    pattern: "npm ERR!|npm WARN|added \\d+ packages?|removed \\d+ packages?|changed \\d+ packages?|audited \\d+ packages?|found \\d+ vulnerabilities?|up to date|Done in|error|warning|failed|FAIL|PASS"

on_error: "passthrough"
