name: "npm-install"
version: 1
description: "Condensed npm install output: keeps package summary, vulnerabilities, and errors"

match:
  command: "npm"
  subcommand: "install"

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^npm (notice|info)"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "keep_lines"
    pattern: "npm ERR!|npm WARN|added \\d+ packages?|removed \\d+ packages?|changed \\d+ packages?|audited \\d+ packages?|found \\d+ vulnerabilities?|up to date|\\d+ packages? are looking for funding"

on_error: "passthrough"
