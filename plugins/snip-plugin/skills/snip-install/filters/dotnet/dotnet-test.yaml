name: "dotnet-test"
version: 2
description: "Condensed dotnet test output: keeps test count, pass/fail status, errors"

match:
  command: "dotnet"
  subcommand: "test"

pipeline:
  - action: "strip_ansi"
  - action: "remove_lines"
    pattern: "^\\s*(Determining projects to restore|All projects are up-to-date for restore)"
  - action: "remove_lines"
    pattern: "^\\s*\\S.*\\s->\\s"
  - action: "remove_lines"
    pattern: "^(Test run for |Microsoft \\(R\\) Test Execution|Copyright \\(c\\) Microsoft|Starting test execution|A total of \\d+ test file)"
  - action: "remove_lines"
    pattern: "^\\s*$"
  - action: "keep_lines"
    pattern: "Passed!|Failed!|Total tests:|Passed:|Failed:|Skipped:|Error|\\d+ test(s)? (passed|failed)|Test Run (Successful|Failed)"
  - action: "compact_path"
  - action: "format_template"
    template: "{{.lines}}"

on_error: "passthrough"
