spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/demodb
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:demo}
    password: ${DB_PASSWORD:demo_secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true

  h2:
    console:
      enabled: false

server:
  port: 8080
  tomcat:
    max-threads: 200
    accept-count: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: WARN
    com.demo: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
  file:
    name: /var/log/demo/application.log
    max-size: 50MB
    max-history: 30
